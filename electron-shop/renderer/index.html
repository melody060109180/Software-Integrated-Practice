<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>在线商城</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .sidebar { min-height: 100vh; background: #343a40; }
        .sidebar .nav-link { color: rgba(255,255,255,.75); padding: 12px 20px; }
        .sidebar .nav-link.active { color: #fff; background: rgba(255,255,255,.1); }
        .sidebar .nav-link i { width: 24px; margin-right: 10px; }
        .stat-card { border-left: 4px solid; }
        .stat-card.primary { border-color: #0d6efd; }
        .stat-card.success { border-color: #198754; }
        .stat-card.warning { border-color: #ffc107; }
        .stat-card.info { border-color: #0dcaf0; }
        .card { border: none; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .text-danger.fw-bold { font-size: 1.2rem; }
        .page { display: none; }
        .page.active { display: block; }
        .category-btn { border-radius: 20px; padding: 6px 16px; font-size: 0.9rem; }
        .category-btn.active { background-color: #0d6efd; color: #fff; }
        #star-rating .star { color: #ccc; cursor: pointer; transition: color 0.15s; }
        #star-rating .star.text-warning { color: #ffc107; }
    </style>
</head>
<body>
    <!-- 首页 - 未登录用户可直接访问 -->
    <div id="page-home" class="page active">
        <nav class="navbar navbar-dark bg-primary px-3">
            <span class="navbar-brand"><i class="bi bi-shop"></i> 在线商城</span>
            <form class="d-flex mx-auto" style="max-width: 400px; width: 100%;" onsubmit="event.preventDefault(); searchGoods();">
                <input class="form-control me-2" type="search" id="searchInput" placeholder="搜索商品">
                <button class="btn btn-outline-light" type="submit">
                    <i class="bi bi-search"></i>
                </button>
            </form>
            <div class="d-flex align-items-center gap-3">
                <button class="btn btn-outline-light btn-sm" onclick="showPage('login')">
                    <i class="bi bi-box-arrow-in-right"></i> 登录
                </button>
                <button class="btn btn-light btn-sm" onclick="showPage('register')">
                    <i class="bi bi-person-plus"></i> 注册
                </button>
            </div>
        </nav>
        <div class="container-fluid">
            <div class="row">
                <nav class="col-md-2 sidebar d-none d-md-block py-3">
                    <ul class="nav flex-column">
                        <li class="nav-item"><a class="nav-link active" href="#" onclick="showHomeSection('goods')"><i class="bi bi-grid"></i> 全部商品</a></li>
                        <li class="nav-item"><a class="nav-link" href="#" onclick="showHomeSection('categories')"><i class="bi bi-tags"></i> 商品分类</a></li>
                    </ul>
                </nav>
                <main class="col-md-10 py-4">
                    <div id="home-content"></div>
                </main>
            </div>
        </div>
    </div>

    <!-- 登录页面 -->
    <div id="page-login" class="page">
        <div class="container">
            <div class="row justify-content-center align-items-center" style="min-height: 100vh;">
                <div class="col-md-5">
                    <div class="card shadow">
                        <div class="card-header bg-primary text-white text-center py-3">
                            <h4 class="mb-0"><i class="bi bi-shop"></i> 在线商城</h4>
                        </div>
                        <div class="card-body p-4">
                            <form id="loginForm">
                                <div class="mb-3">
                                    <label for="username" class="form-label">用户名</label>
                                    <input type="text" class="form-control" id="username" required>
                                </div>
                                <div class="mb-3">
                                    <label for="password" class="form-label">密码</label>
                                    <input type="password" class="form-control" id="password" required>
                                </div>
                                <div class="mb-3">
                                    <label class="form-label">登录身份</label>
                                    <div class="d-flex gap-3">
                                        <div class="form-check">
                                            <input class="form-check-input" type="radio" name="loginType" id="typeUser" value="user" checked>
                                            <label class="form-check-label" for="typeUser"><i class="bi bi-person"></i> 用户</label>
                                        </div>
                                        <div class="form-check">
                                            <input class="form-check-input" type="radio" name="loginType" id="typeMerchant" value="merchant">
                                            <label class="form-check-label" for="typeMerchant"><i class="bi bi-shop"></i> 商家</label>
                                        </div>
                                        <div class="form-check">
                                            <input class="form-check-input" type="radio" name="loginType" id="typeAdmin" value="admin">
                                            <label class="form-check-label" for="typeAdmin"><i class="bi bi-shield-lock"></i> 管理员</label>
                                        </div>
                                    </div>
                                </div>
                                <button type="submit" class="btn btn-primary w-100 py-2">登录</button>
                            </form>
                            <div id="loginError" class="alert alert-danger mt-3 d-none"></div>
                            <div class="text-center mt-3">
                                <span class="text-muted">还没有账号？</span>
                                <a href="#" onclick="showPage('register')">立即注册</a>
                            </div>
                            <div class="text-center mt-2">
                                <a href="#" onclick="showPage('home');showHomeSection('goods')"><i class="bi bi-arrow-left"></i> 返回首页</a>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 注册页面 -->
    <div id="page-register" class="page">
        <div class="container">
            <div class="row justify-content-center align-items-center" style="min-height: 100vh;">
                <div class="col-md-5">
                    <div class="card shadow">
                        <div class="card-header bg-success text-white text-center py-3">
                            <h4 class="mb-0"><i class="bi bi-person-plus"></i> 用户注册</h4>
                        </div>
                        <div class="card-body p-4">
                            <form id="registerForm">
                                <div class="mb-3">
                                    <label for="reg-username" class="form-label">用户名</label>
                                    <input type="text" class="form-control" id="reg-username" required>
                                </div>
                                <div class="mb-3">
                                    <label for="reg-email" class="form-label">邮箱</label>
                                    <input type="email" class="form-control" id="reg-email" required>
                                    <small class="form-text text-muted">用于找回密码和接收通知</small>
                                </div>
                                <div class="mb-3">
                                    <label for="reg-password" class="form-label">密码</label>
                                    <input type="password" class="form-control" id="reg-password" required minlength="8">
                                    <small class="form-text text-muted">密码长度至少8位</small>
                                </div>
                                <div class="mb-3">
                                    <label for="reg-password2" class="form-label">确认密码</label>
                                    <input type="password" class="form-control" id="reg-password2" required>
                                </div>
                                <button type="submit" class="btn btn-success w-100 py-2">注册</button>
                            </form>
                            <div id="registerError" class="alert alert-danger mt-3 d-none"></div>
                            <div class="text-center mt-3">
                                <span class="text-muted">已有账号？</span>
                                <a href="#" onclick="showPage('login')">返回登录</a>
                            </div>
                            <div class="text-center mt-2">
                                <a href="#" onclick="showPage('register-merchant')" class="text-success">商家入驻</a>
                            </div>
                            <div class="text-center mt-2">
                                <a href="#" onclick="showPage('home');showHomeSection('goods')"><i class="bi bi-arrow-left"></i> 返回首页</a>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 商家注册页面 -->
    <div id="page-register-merchant" class="page">
        <div class="container">
            <div class="row justify-content-center align-items-center" style="min-height: 100vh;">
                <div class="col-md-5">
                    <div class="card shadow">
                        <div class="card-header bg-primary text-white text-center py-3">
                            <h4 class="mb-0"><i class="bi bi-shop"></i> 商家入驻</h4>
                        </div>
                        <div class="card-body p-4">
                            <form id="merchantRegisterForm">
                                <div class="mb-3">
                                    <label for="m-reg-username" class="form-label">用户名</label>
                                    <input type="text" class="form-control" id="m-reg-username" required>
                                </div>
                                <div class="mb-3">
                                    <label for="m-reg-email" class="form-label">邮箱</label>
                                    <input type="email" class="form-control" id="m-reg-email" required>
                                </div>
                                <div class="mb-3">
                                    <label for="m-reg-password" class="form-label">密码</label>
                                    <input type="password" class="form-control" id="m-reg-password" required minlength="8">
                                </div>
                                <div class="mb-3">
                                    <label for="m-reg-shopname" class="form-label">店铺名称</label>
                                    <input type="text" class="form-control" id="m-reg-shopname" required>
                                </div>
                                <div class="mb-3">
                                    <label for="m-reg-phone" class="form-label">联系电话</label>
                                    <input type="tel" class="form-control" id="m-reg-phone" required>
                                </div>
                                <div class="mb-3">
                                    <label for="m-reg-address" class="form-label">店铺地址</label>
                                    <input type="text" class="form-control" id="m-reg-address" required>
                                </div>
                                <button type="submit" class="btn btn-primary w-100 py-2">注册商家</button>
                            </form>
                            <div id="merchantRegisterError" class="alert alert-danger mt-3 d-none"></div>
                            <div class="text-center mt-3">
                                <span class="text-muted">已有账号？</span>
                                <a href="#" onclick="showPage('login')">返回登录</a>
                            </div>
                            <div class="text-center mt-2">
                                <a href="#" onclick="showPage('home');showHomeSection('goods')"><i class="bi bi-arrow-left"></i> 返回首页</a>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 用户端主页面 -->
    <div id="page-user" class="page">
        <nav class="navbar navbar-dark bg-primary px-3">
            <span class="navbar-brand"><i class="bi bi-shop"></i> 在线商城</span>
            <div class="d-flex align-items-center gap-3">
                <span id="userInfo" class="text-white"></span>
                <button class="btn btn-outline-light btn-sm" onclick="logout()">退出</button>
            </div>
        </nav>
        <div class="container-fluid">
            <div class="row">
                <nav class="col-md-2 sidebar d-none d-md-block py-3">
                    <ul class="nav flex-column">
                        <li class="nav-item"><a class="nav-link active" href="#" onclick="showSection('goods')"><i class="bi bi-grid"></i> 全部商品</a></li>
                        <li class="nav-item"><a class="nav-link" href="#" onclick="showSection('cart')"><i class="bi bi-cart3"></i> 购物车</a></li>
                        <li class="nav-item"><a class="nav-link" href="#" onclick="showSection('orders')"><i class="bi bi-receipt"></i> 我的订单</a></li>
                        <li class="nav-item"><a class="nav-link" href="#" onclick="showSection('profile')"><i class="bi bi-person"></i> 个人中心</a></li>
                    </ul>
                </nav>
                <main class="col-md-10 py-4">
                    <div id="user-content"></div>
                </main>
            </div>
        </div>
    </div>

    <!-- 商家端主页面 -->
    <div id="page-merchant" class="page">
        <nav class="navbar navbar-dark bg-success px-3">
            <span class="navbar-brand"><i class="bi bi-shop"></i> 商家后台</span>
            <div class="d-flex align-items-center gap-3">
                <span id="merchantInfo" class="text-white"></span>
                <button class="btn btn-outline-light btn-sm" onclick="logout()">退出</button>
            </div>
        </nav>
        <div class="container-fluid">
            <div class="row">
                <nav class="col-md-2 sidebar d-none d-md-block py-3">
                    <ul class="nav flex-column">
                        <li class="nav-item"><a class="nav-link active" href="#" onclick="showMerchantSection('dashboard')"><i class="bi bi-speedometer2"></i> 数据概览</a></li>
                        <li class="nav-item"><a class="nav-link" href="#" onclick="showMerchantSection('goods')"><i class="bi bi-box-seam"></i> 商品管理</a></li>
                        <li class="nav-item"><a class="nav-link" href="#" onclick="showMerchantSection('orders')"><i class="bi bi-receipt"></i> 订单管理</a></li>
                    </ul>
                </nav>
                <main class="col-md-10 py-4">
                    <div id="merchant-content"></div>
                </main>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
