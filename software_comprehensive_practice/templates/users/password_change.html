{% extends 'base.html' %}

{% block title %}修改密码 - 在线商城{% endblock %}

{% block content %}
<div class="row">
    <div class="col-md-3">
        <div class="list-group">
            <a href="{% url 'users:profile' %}" class="list-group-item list-group-item-action">个人信息</a>
            <a href="{% url 'users:profile_edit' %}" class="list-group-item list-group-item-action">修改信息</a>
            <a href="{% url 'users:password_change' %}" class="list-group-item list-group-item-action active">修改密码</a>
            <a href="{% url 'users:address_list' %}" class="list-group-item list-group-item-action">收货地址</a>
            <a href="{% url 'orders:list' %}" class="list-group-item list-group-item-action">我的订单</a>
        </div>
    </div>
    <div class="col-md-9">
        <div class="card">
            <div class="card-header">
                <h4 class="mb-0">修改密码</h4>
            </div>
            <div class="card-body">
                <form method="post">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label for="old_password" class="form-label">原密码</label>
                        <input type="password" name="old_password" id="old_password" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label for="new_password1" class="form-label">新密码</label>
                        <input type="password" name="new_password1" id="new_password1" class="form-control" required>
                        <small class="form-text text-muted">密码长度至少8位</small>
                    </div>
                    <div class="mb-3">
                        <label for="new_password2" class="form-label">确认新密码</label>
                        <input type="password" name="new_password2" id="new_password2" class="form-control" required>
                    </div>
                    <button type="submit" class="btn btn-primary">修改密码</button>
                    <a href="{% url 'users:profile' %}" class="btn btn-secondary">取消</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
