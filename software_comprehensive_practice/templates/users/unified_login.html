{% extends 'base.html' %}

{% block title %}登录 - 在线商城{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card auth-card">
            <div class="card-header bg-primary text-white text-center">
                <h4 class="mb-0"><i class="bi bi-shop"></i> 在线商城</h4>
            </div>
            <div class="card-body">
                {% if messages %}
                    {% for message in messages %}
                        <div class="alert alert-{{ message.tags }} alert-dismissible fade show" role="alert">
                            {{ message }}
                            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                        </div>
                    {% endfor %}
                {% endif %}

                <form method="post">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label for="username" class="form-label">用户名 / 手机号</label>
                        <input type="text" name="username" id="username" class="form-control" required autofocus placeholder="请输入用户名或手机号">
                        <small class="text-muted">骑手请输入注册时的手机号</small>
                    </div>
                    <div class="mb-3">
                        <label for="password" class="form-label">密码</label>
                        <input type="password" name="password" id="password" class="form-control" required placeholder="请输入密码">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">登录身份</label>
                        <div class="d-flex gap-3">
                            <div class="form-check">
                                <input class="form-check-input" type="radio" name="login_type" id="type_user" value="user" checked>
                                <label class="form-check-label" for="type_user">
                                    <i class="bi bi-person"></i> 普通用户
                                </label>
                            </div>
                            <div class="form-check">
                                <input class="form-check-input" type="radio" name="login_type" id="type_admin" value="admin">
                                <label class="form-check-label" for="type_admin">
                                    <i class="bi bi-shield-lock"></i> 管理员
                                </label>
                            </div>
                            <div class="form-check">
                                <input class="form-check-input" type="radio" name="login_type" id="type_rider" value="rider">
                                <label class="form-check-label" for="type_rider">
                                    <i class="bi bi-bicycle"></i> 骑手
                                </label>
                            </div>
                        </div>
                    </div>
                    <button type="submit" class="btn btn-primary w-100 py-2" style="border-radius:var(--btn-radius); font-weight:600;">登录</button>
                </form>

                <hr>

                <div class="text-center">
                    <p class="mb-2 text-muted">还没有账号？</p>
                    <div class="d-flex justify-content-center gap-2">
                        <a href="{% url 'users:register' %}" class="btn btn-outline-primary btn-sm" style="border-radius:var(--btn-radius);">
                            <i class="bi bi-person-plus"></i> 用户注册
                        </a>
                        <a href="{% url 'riders:register' %}" class="btn btn-outline-success btn-sm" style="border-radius:var(--btn-radius);">
                            <i class="bi bi-bicycle"></i> 骑手注册
                        </a>
                    </div>
                </div>

                <div class="text-center mt-3">
                    <a href="{% url 'goods:index' %}" style="color:var(--primary);">
                        <i class="bi bi-arrow-left"></i> 返回首页
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
