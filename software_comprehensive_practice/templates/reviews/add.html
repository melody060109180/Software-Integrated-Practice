{% extends 'base.html' %}

{% block title %}发表评价 - 在线商城{% endblock %}

{% block content %}
<nav aria-label="breadcrumb" class="mb-3">
    <ol class="breadcrumb">
        <li class="breadcrumb-item"><a href="{% url 'goods:detail' goods.pk %}">{{ goods.name }}</a></li>
        <li class="breadcrumb-item active">发表评价</li>
    </ol>
</nav>

<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card">
            <div class="card-header">
                <h5 class="mb-0">发表评价</h5>
            </div>
            <div class="card-body">
                <div class="d-flex align-items-center mb-4">
                    {% if goods.image %}
                        <img src="{{ goods.image.url }}" alt="" class="rounded me-3" style="width: 60px; height: 60px; object-fit: cover;">
                    {% endif %}
                    <div>
                        <div>{{ goods.name }}</div>
                        <small class="text-muted">¥{{ goods.price }}</small>
                    </div>
                </div>
                
                <form method="post">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label class="form-label">评分</label>
                        <div class="rating-input">
                            {% for i in "54321" %}
                                <div class="form-check form-check-inline">
                                    <input class="form-check-input" type="radio" name="rating" 
                                           id="rating{{ i }}" value="{{ i }}" {% if i == "5" %}checked{% endif %}>
                                    <label class="form-check-label" for="rating{{ i }}">
                                        <span class="star-rating">{{ i }}星</span>
                                    </label>
                                </div>
                            {% endfor %}
                        </div>
                    </div>
                    <div class="mb-3">
                        <label for="content" class="form-label">评价内容</label>
                        <textarea name="content" id="content" class="form-control" rows="4" 
                                  placeholder="分享您的使用体验..."></textarea>
                    </div>
                    <button type="submit" class="btn btn-primary">提交评价</button>
                    <a href="{% url 'goods:detail' goods.pk %}" class="btn btn-secondary">取消</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
