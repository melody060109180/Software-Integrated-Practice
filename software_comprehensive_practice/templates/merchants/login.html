{% extends 'base.html' %}

{% block title %}商家登录 - 在线商城{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card">
            <div class="card-body text-center py-5">
                <i class="bi bi-shop" style="font-size: 3rem; color: var(--primary);"></i>
                <h4 class="mt-3">商家登录已迁移</h4>
                <p class="text-muted">请使用统一登录入口，选择"管理员"身份登录</p>
                <a href="{% url 'users:unified_login' %}" class="btn btn-primary">
                    <i class="bi bi-box-arrow-in-right"></i> 去登录
                </a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
