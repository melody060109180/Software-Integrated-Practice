{% extends 'base.html' %}

{% block title %}支付 - 在线商城{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card">
            <div class="card-header text-center">
                <h4 class="mb-0">订单支付</h4>
            </div>
            <div class="card-body">
                <div class="text-center mb-4">
                    <p class="text-muted">订单号：{{ order.order_no }}</p>
                    <div class="text-danger fw-bold" style="font-size: 2.5rem;">¥{{ order.total_amount }}</div>
                </div>
                
                <div class="mb-4">
                    <label class="form-label">选择支付方式</label>
                    <div class="form-check mb-2">
                        <input class="form-check-input" type="radio" name="payment_method" id="alipay" value="1" checked>
                        <label class="form-check-label" for="alipay">
                            <i class="bi bi-alipay text-primary"></i> 支付宝
                        </label>
                    </div>
                    <div class="form-check mb-2">
                        <input class="form-check-input" type="radio" name="payment_method" id="wechat" value="2">
                        <label class="form-check-label" for="wechat">
                            <i class="bi bi-wechat text-success"></i> 微信支付
                        </label>
                    </div>
                    <div class="form-check">
                        <input class="form-check-input" type="radio" name="payment_method" id="card" value="3">
                        <label class="form-check-label" for="card">
                            <i class="bi bi-credit-card"></i> 银行卡
                        </label>
                    </div>
                </div>
                
                <div class="d-grid gap-2">
                    <a href="{% url 'payments:success' order.pk %}" class="btn btn-primary btn-lg">
                        确认支付
                    </a>
                    <a href="{% url 'payments:cancel' order.pk %}" class="btn btn-outline-secondary">
                        取消支付
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
